<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>LOGIN VGA TECH V2</title>
    <link rel="manifest" href="./manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <meta name="apple-mobile-web-app-title" content="VGA TECH">
    <link rel="apple-touch-icon" href="./logo/logo.jpg">
    <meta name="theme-color" content="#000000">
    <!-- Google Fonts & Material Symbols -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0,1" rel="stylesheet">
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>
    <link rel="stylesheet" href="./file1_style.css">
    <script src="./file1_script.js" defer></script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(registration => {
                        console.log('ServiceWorker registered: ', registration);
                    })
                    .catch(error => {
                        console.log('ServiceWorker registration failed: ', error);
                    });
            });
        }
    </script>
</head>
<body>
    <div id="sessionLoading" class="session-check-loading">
        <div class="loading-spinner"></div>
        <div class="loading-text">CHECKING SESSION...</div>
    </div>

    <div class="split-layout" id="loginLayout" style="display: none;">
        <div class="brand-side">
            <div class="animated-grid"></div>
            <div class="floating-particles" id="particlesContainer"></div>
            <div class="brand-container">
                <div class="logo-wrapper" id="logoWrapper">
                    <img id="mainLogo" class="logo-img" src="https://res.cloudinary.com/duh8ofg5n/image/upload/v1776511565/1000033351_njyn5j.png" alt="VGA Tech Logo">
                </div>
                <h1 class="brand-title">VGA TECH V2</h1>
                <div class="brand-sub">LOGIN</div>
                
                <div class="security-video-container" id="securityVideoContainer">
                    <div class="video-wrapper">
                        <video class="security-video" id="securityVideo" loop muted playsinline preload="metadata">
                            <source src="https://player.cloudinary.com/embed/?cloud_name=duh8ofg5n&public_id=VID-20260526-WA0097_ggvufv" type="video/mp4">
                        </video>
                    </div>
                </div>
            </div>
        </div>

        <div class="form-side">
            <div class="form-wrapper">
                <div class="form-header">
                    <h2>PREMIUM</h2>
                    <p>Authenticate your identity</p>
                </div>
                <form id="secureLoginForm" novalidate>
                    <div class="input-group">
                        <span class="material-symbols-rounded input-icon">person</span>
                        <input type="text" id="fullname" class="input-field" placeholder="Username" autocomplete="username">
                        <div id="nameErrorMsg" class="error-msg"><span class="material-symbols-rounded" style="font-size:14px;">error</span> Nama tidak boleh kosong</div>
                    </div>
                    <div class="input-group">
                        <span class="material-symbols-rounded input-icon">lock</span>
                        <input type="password" id="passwordField" class="input-field" placeholder="Password" autocomplete="current-password">
                        <span class="material-symbols-rounded toggle-pw" id="togglePasswordBtn">visibility</span>
                        <div id="passErrorMsg" class="error-msg"><span class="material-symbols-rounded" style="font-size:14px;">error</span> Password tidak boleh kosong</div>
                    </div>
                    <button type="submit" id="loginBtnAction" class="login-button"><span class="btn-label">LOGIN</span></button>
                </form>
                <button id="daftarMarketBtn" class="daftar-button"><span class="material-symbols-rounded">storefront</span> DAFTAR</button>
                <div class="secure-footer"><span class="material-symbols-rounded">shield_lock</span><span>Protected Secure System</span></div>
            </div>
        </div>
    </div>

    <div id="marketPage" class="market-overlay">
        <div class="market-header">
            <h1>🛒 MARKET | PAKET VGA TECH</h1>
            <div class="back-btn" id="backToLoginBtn"><span class="material-symbols-rounded">arrow_back</span> Kembali</div>
        </div>
        <div class="rak-grid" id="rakGridContainer"></div>
    </div>

    <div id="audioControlBtn" class="audio-control">
        <span class="material-symbols-rounded" style="font-size: 18px;">music_note</span>
        <span id="audioStatusText">Aktifkan Audio</span>
    </div>
</body>
</html>
